name: CDN Deploy

on:
  push:
    branches: [main]

jobs:
  build-css:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install -g clean-css-cli
      - run: npm install -g postcss-cli

      - name: Build CSS
        run: |
          mkdir -p dist
          npx postcss src/megon.css -o dist/megon.css
          cleancss -O2 -o dist/megon.min.css dist/megon.css

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build-css
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/deploy-pages@v4
