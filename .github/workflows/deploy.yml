name: Megon CSS Build & Deploy
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CleanCSS
        run: npm install -g clean-css-cli

      - name: Combine CSS Files
        run: |
          mkdir -p dist/1.0.0
          rm -f dist/1.0.0/megon.css
          find src -type f -iname "*.css" ! -name "megon.css" | sort | while read file; do
            cat "$file" >> dist/1.0.0/megon.css
            echo "" >> dist/1.0.0/megon.css
          done

      - name: Minify CSS
        run: |
          cleancss -O2 -o dist/1.0.0/megon.min.css dist/1.0.0/megon.css

      - name: Commit Build Files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add dist/
          git diff --cached --quiet && exit 0
          git commit -m "Production Build: Version 1.0.0"
          git push

      - name: FTP Deploy to cPanel
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: /release