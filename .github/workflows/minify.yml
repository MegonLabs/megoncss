name: Megon CSS Minifier
on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Combine and Minify CSS
        run: |
          rm -rf dist/latest
          mkdir -p dist/latest
          find src -type f -name "*.css" -not -name "megon.css" -exec cat {} + > dist/latest/megon.css
          grep -v "@import" dist/latest/megon.css | tr -d '\n' | sed 's/  */ /g' | sed 's/ :/:/g' | sed 's/ {/{/g' | sed 's/{ /{/g' | sed 's/ ;/;/g' | sed 's/; /;/g' > dist/latest/megon.min.css

      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f dist/
          git commit -m "Auto-minify megon.css" || exit 0
          git push
