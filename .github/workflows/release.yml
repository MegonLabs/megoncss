name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: "pnpm"

      - uses: actions-rust-lang/setup-rust-toolchain@v1

      - run: pnpm install

      - name: Build Rust
        run: cargo build --release --workspace

      - name: Build TypeScript
        run: pnpm build

      - name: Build CSS
        run: |
          npm install -g clean-css-cli
          mkdir -p packages/megoncss/dist
          npx postcss src/megon.css -o packages/megoncss/dist/megon.css
          cleancss -O2 -o packages/megoncss/dist/megon.min.css packages/megoncss/dist/megon.css

      - name: Publish npm packages
        run: |
          cd packages/megoncss && npm publish --access public
          cd ../core && npm publish --access public
          cd ../postcss && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/megoncss/dist/megon.css
            packages/megoncss/dist/megon.min.css
